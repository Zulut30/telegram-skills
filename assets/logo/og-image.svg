<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2AABEE"/>
      <stop offset="100%" stop-color="#229ED9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="120" height="120" rx="24" fill="url(#accent)"/>
  <path d="M110 140 L135 165 L170 115"
        stroke="white" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Title -->
  <text x="240" y="155" fill="white" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="88" font-weight="800" letter-spacing="-2">BotForge</text>

  <!-- Subtitle -->
  <text x="240" y="205" fill="#8FB4D9" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="28" font-weight="400">The Telegram Bot Engineering Skill for AI</text>

  <!-- Feature pills -->
  <g font-family="'SF Pro Text', -apple-system, system-ui, sans-serif" font-size="24" font-weight="500">
    <g transform="translate(80, 290)">
      <rect width="220" height="56" rx="28" fill="#1C3D5E" stroke="#2AABEE" stroke-width="1"/>
      <text x="110" y="36" fill="white" text-anchor="middle">aiogram 3 · Python 3.12</text>
    </g>
    <g transform="translate(316, 290)">
      <rect width="220" height="56" rx="28" fill="#1C3D5E" stroke="#2AABEE" stroke-width="1"/>
      <text x="110" y="36" fill="white" text-anchor="middle">Postgres · Redis · Docker</text>
    </g>
    <g transform="translate(552, 290)">
      <rect width="220" height="56" rx="28" fill="#1C3D5E" stroke="#2AABEE" stroke-width="1"/>
      <text x="110" y="36" fill="white" text-anchor="middle">Mini Apps · Payments</text>
    </g>
    <g transform="translate(788, 290)">
      <rect width="200" height="56" rx="28" fill="#1C3D5E" stroke="#2AABEE" stroke-width="1"/>
      <text x="100" y="36" fill="white" text-anchor="middle">Bot API 9.6</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="80" y="440" fill="white" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="48" font-weight="700" letter-spacing="-1">Architecture before code.</text>
  <text x="80" y="500" fill="#8FB4D9" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="32" font-weight="400">Production-ready bots. Every time.</text>

  <!-- IDE badges -->
  <g font-family="'SF Pro Text', -apple-system, system-ui, sans-serif" font-size="22" font-weight="600"
     transform="translate(80, 550)">
    <text x="0" y="20" fill="#8FB4D9">Claude Code · Cursor · Codex · Any LLM</text>
  </g>
</svg>
