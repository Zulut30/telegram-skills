repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.0
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.yaml"]

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: validate-plugin-manifest
        name: validate plugin.json
        entry: python tests/validate_plugin_manifest.py
        language: system
        pass_filenames: false
        files: '^\.claude-plugin/plugin\.json$|^\.claude/(commands|skills)/.*\.md$'

      - id: validate-command-frontmatter
        name: validate command frontmatter
        entry: python tests/validate_frontmatter.py
        language: system
        pass_filenames: false
        files: '^\.claude/commands/.*\.md$'

      - id: four-format-sync
        name: four-format skill prompt sync
        entry: python tests/check_sync.py
        language: system
        pass_filenames: false
        files: '^(\.claude/skills/botforge/SKILL\.md|system_prompt\.txt|cursor/.*|codex/AGENTS\.md)$'
