title: "[Q&A] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Ask a question about BotForge usage, patterns, or best practices.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installation
        - Mini Apps
        - Payments
        - Deploy
        - Architecture
        - i18n
        - Testing
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What you've tried so far
