title: "[Show and tell] "
labels: ["show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        Share a bot you built with BotForge.
  - type: input
    id: bot_handle
    attributes:
      label: Bot handle
      placeholder: "@my_bot"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Public link (optional)
      placeholder: "https://t.me/my_bot"
  - type: textarea
    id: description
    attributes:
      label: What does it do?
      description: 1–3 sentences.
    validations:
      required: true
  - type: textarea
    id: stack
    attributes:
      label: Interesting stack choices
      placeholder: Which BotForge features did you use? (/botforge-miniapp, /botforge-payments, …)
